<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screen 1 — Hero</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    .preview {
      background: linear-gradient(175deg, #1E1437 0%, #2A1D45 40%, #1A1230 100%);
    }

    /* Soft radial glow */
    .glow-1 {
      position: absolute;
      top: -300px;
      right: -200px;
      width: 1200px;
      height: 1200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,107,196,0.15) 0%, transparent 65%);
    }
    .glow-2 {
      position: absolute;
      bottom: 400px;
      left: -300px;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(75,50,140,0.12) 0%, transparent 65%);
    }

    /* App icon + name */
    .app-brand {
      position: absolute;
      top: 120px;
      left: 100px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 5;
    }
    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(124,107,196,0.4);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .app-name {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.5px;
    }

    /* Main headline */
    .hero-text {
      position: absolute;
      top: 320px;
      left: 100px;
      z-index: 5;
      max-width: 650px;
    }
    .hero-text .headline {
      font-size: 128px;
      color: var(--white);
      margin-bottom: 40px;
    }
    .hero-text .sub-text {
      font-size: 36px;
      max-width: 500px;
      margin-bottom: 50px;
    }

    /* Trust badges */
    .trust-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    /* Phone — tilted, right side, large */
    .phone-wrap {
      position: absolute;
      right: -60px;
      top: 500px;
      width: 780px;
      z-index: 4;
      transform: rotate(6deg);
    }
    .phone-wrap img {
      width: 100%;
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.4));
    }

    /* CTA pill at bottom */
    .cta-area {
      position: absolute;
      bottom: 140px;
      left: 100px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="preview">
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- Brand -->
    <div class="app-brand">
      <div class="app-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <path d="M20 8C14 8 10 14 10 20C10 26 14 32 20 32C26 32 30 26 30 20" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="12" r="3" fill="white" opacity="0.8"/>
        </svg>
      </div>
      <div class="app-name">Untwist</div>
    </div>

    <!-- Headline -->
    <div class="hero-text">
      <div class="headline">
        You're not<br><em>stuck.</em>
      </div>
      <div class="sub-text">
        Understand your thoughts.<br>
        One breath at a time.
      </div>

      <div class="trust-row">
        <div class="trust-badge">🔒 100% on-device</div>
        <div class="trust-badge">🧠 Based on CBT</div>
      </div>
    </div>

    <!-- Phone — tilted -->
    <div class="phone-wrap">
      <img src="phones/home_en.png" alt="Home">
    </div>
  </div>
</body>
</html>
