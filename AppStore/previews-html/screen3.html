<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screen 3 — Mood Check</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    .preview {
      background: linear-gradient(180deg, #F5F0FF 0%, #EDE5FC 100%);
    }

    /* Soft decorative circles */
    .deco-1 {
      position: absolute;
      top: 1200px;
      left: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,107,196,0.08) 0%, transparent 70%);
    }
    .deco-2 {
      position: absolute;
      bottom: -100px;
      right: -150px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,155,212,0.1) 0%, transparent 70%);
    }

    /* Top headline area */
    .text-block {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 5;
      width: 1100px;
    }
    .text-block .pill {
      margin-bottom: 40px;
    }
    .text-block .headline {
      font-size: 130px;
      color: var(--text-dark);
      margin-bottom: 24px;
    }
    .text-block .sub-text-dark {
      font-size: 34px;
      max-width: 650px;
      margin: 0 auto;
    }

    /* Phone — big, centered, overflowing bottom */
    .phone-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 700px;
      width: 860px;
      z-index: 4;
    }
    .phone-wrap img {
      width: 100%;
      filter: drop-shadow(0 30px 70px rgba(45,35,68,0.2));
    }

    /* Floating "10 sec" badge — over phone, top-right */
    .badge-float {
      position: absolute;
      top: 860px;
      right: 140px;
      z-index: 6;
      transform: rotate(5deg);
    }
    .badge-float .pill {
      background: var(--text-dark);
      color: white;
      font-size: 30px;
      padding: 16px 32px;
      box-shadow: 0 8px 30px rgba(45,35,68,0.25);
    }
  </style>
</head>
<body>
  <div class="preview">
    <div class="deco-1"></div>
    <div class="deco-2"></div>

    <!-- Text -->
    <div class="text-block">
      <span class="pill pill-dark">Track</span>
      <div class="headline headline-dark">
        How are you,<br><em>really?</em>
      </div>
      <div class="sub-text sub-text-dark">
        10 seconds. No judgment. Just you.
      </div>
    </div>

    <!-- Phone — big -->
    <div class="phone-wrap">
      <img src="phones/mood_en.png" alt="Mood Check">
    </div>

    <!-- Floating badge -->
    <div class="badge-float">
      <span class="pill">⚡ 10 sec</span>
    </div>
  </div>
</body>
</html>
